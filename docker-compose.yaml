services:
  postgres:
    image: postgres:17
    container_name: warehouse-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: warehouse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d warehouse"]
      interval: 2s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: .
      dockerfile: docker/node-dev.Dockerfile
    container_name: warehouse-backend
    working_dir: /workspace
    environment:
      PORT: "3300"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/warehouse"
      PNPM_STORE_DIR: /pnpm-store
      DB_SEEDING: "true"
      INSTALL_LOCK_FILE: /pnpm-store/install.lock
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3300:3300"
    volumes:
      - .:/workspace
      - pnpm_store:/pnpm-store
      - backend_node_modules:/workspace/backend/node_modules
      - root_node_modules:/workspace/node_modules
      - shared_node_modules:/workspace/packages/shared/node_modules
    command: >
      sh -lc "
        (mkdir -p /pnpm-store && (set -C; : > \"$INSTALL_LOCK_FILE\") ) 2>/dev/null || (echo \"Waiting for pnpm install lock...\"; while [ -e \"$INSTALL_LOCK_FILE\" ]; do sleep 1; done; (set -C; : > \"$INSTALL_LOCK_FILE\") ) &&
        pnpm install --frozen-lockfile || pnpm install;
        rm -f \"$INSTALL_LOCK_FILE\" &&
        pnpm --filter backend db:migrate &&
        pnpm --filter backend db:seed &&
        pnpm --filter backend db:seed-mock &&
        pnpm --filter backend start:dev
      "

  frontend:
    build:
      context: .
      dockerfile: docker/node-dev.Dockerfile
    container_name: warehouse-frontend
    working_dir: /workspace
    environment:
      PNPM_STORE_DIR: /pnpm-store
      NEXT_TELEMETRY_DISABLED: "1"
      BACKEND_API_BASE_URL: "http://backend:3300"
      BASE_URL: "http://localhost:3000"
      INSTALL_LOCK_FILE: /pnpm-store/install.lock
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - pnpm_store:/pnpm-store
      - frontend_node_modules:/workspace/frontend/node_modules
      - root_node_modules:/workspace/node_modules
      - shared_node_modules:/workspace/packages/shared/node_modules
    command: >
      sh -lc "
        (mkdir -p /pnpm-store && (set -C; : > \"$INSTALL_LOCK_FILE\") ) 2>/dev/null || (echo \"Waiting for pnpm install lock...\"; while [ -e \"$INSTALL_LOCK_FILE\" ]; do sleep 1; done; (set -C; : > \"$INSTALL_LOCK_FILE\") ) &&
        pnpm install --frozen-lockfile || pnpm install;
        rm -f \"$INSTALL_LOCK_FILE\" &&
        pnpm --filter frontend dev --hostname 0.0.0.0 --port 3000
      "

volumes:
  postgres_data:
  pnpm_store:
  root_node_modules:
  frontend_node_modules:
  backend_node_modules:
  shared_node_modules:
