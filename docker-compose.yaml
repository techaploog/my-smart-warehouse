services:
  postgres:
    image: postgres:17
    container_name: warehouse-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: warehouse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d warehouse"]
      interval: 2s
      timeout: 3s
      retries: 30

  # Single pnpm install for the workspace — avoids two containers renaming pnpm-workspace.yaml concurrently (ENOENT).
  workspace-install:
    build:
      context: .
      dockerfile: docker/node-dev.Dockerfile
    container_name: warehouse-workspace-install
    working_dir: /workspace
    environment:
      PNPM_STORE_DIR: /pnpm-store
    volumes:
      - .:/workspace
      - pnpm_store:/pnpm-store
      - frontend_node_modules:/workspace/frontend/node_modules
      - backend_node_modules:/workspace/backend/node_modules
      - root_node_modules:/workspace/node_modules
      - shared_node_modules:/workspace/packages/shared/node_modules
    command: >
      sh -lc "pnpm install --frozen-lockfile || pnpm install"
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: docker/node-dev.Dockerfile
    container_name: warehouse-backend
    working_dir: /workspace
    environment:
      PORT: "3300"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/warehouse"
      PNPM_STORE_DIR: /pnpm-store
      DB_SEEDING: "true"
    depends_on:
      postgres:
        condition: service_healthy
      workspace-install:
        condition: service_completed_successfully
    ports:
      - "3300:3300"
    volumes:
      - .:/workspace
      - pnpm_store:/pnpm-store
      - backend_node_modules:/workspace/backend/node_modules
      - root_node_modules:/workspace/node_modules
      - shared_node_modules:/workspace/packages/shared/node_modules
    command: >
      sh -lc "
        pnpm --filter backend db:migrate &&
        pnpm --filter backend db:seed &&
        pnpm --filter backend db:seed-mock &&
        pnpm --filter backend start:dev
      "

  frontend:
    build:
      context: .
      dockerfile: docker/node-dev.Dockerfile
    container_name: warehouse-frontend
    working_dir: /workspace
    environment:
      PNPM_STORE_DIR: /pnpm-store
      NEXT_TELEMETRY_DISABLED: "1"
      BACKEND_API_BASE_URL: "http://backend:3300"
      BASE_URL: "http://localhost:3000"
    depends_on:
      workspace-install:
        condition: service_completed_successfully
      backend:
        condition: service_started
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - pnpm_store:/pnpm-store
      - frontend_node_modules:/workspace/frontend/node_modules
      - root_node_modules:/workspace/node_modules
      - shared_node_modules:/workspace/packages/shared/node_modules
    command: >
      sh -lc "
        pnpm --filter frontend dev --hostname 0.0.0.0 --port 3000
      "

volumes:
  postgres_data:
  pnpm_store:
  root_node_modules:
  frontend_node_modules:
  backend_node_modules:
  shared_node_modules:
